services:
  - type: web
    name: maint-agent-api
    runtime: node
    region: frankfurt
    plan: starter
    branch: main
    autoDeploy: true

    # --- Build ---
    buildCommand: npm ci && cd apps/api && npx prisma generate --schema ./prisma/schema.prisma && rm -rf dist && npm run build

    # --- Start (migrate first — idempotent, safe on every boot) ---
    startCommand: cd apps/api && npx prisma migrate deploy --schema ./prisma/schema.prisma && node dist/server.js

    # --- Health check ---
    healthCheckPath: /health

    # --- Environment variables ---
    # Non-secret values declared inline; secrets set in Render dashboard
    # (see apps/api/.env.staging for staging values).
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      # CORS: allow the Vercel frontend to call the backend directly.
      # Large PDF uploads bypass the Vercel proxy (4.5 MB serverless limit).
      # Comma-separate additional origins without spaces if needed.
      - key: CORS_ORIGIN
        value: "https://maintenance-agent-api-git-main-christophepians-projects.vercel.app"

    # Secrets — set in Render dashboard, never committed:
    #   DATABASE_URL          postgresql://...supabase.co:6543/postgres?pgbouncer=true
    #   DIRECT_URL            postgresql://...supabase.co:5432/postgres
    #   AUTH_SECRET           32+ char random string
    #   SUPABASE_URL          https://znsdygeodyglbyunitcp.supabase.co
    #   ATTACHMENTS_STORAGE   s3
    #   S3_REGION             eu-central-1
    #   S3_ENDPOINT           https://znsdygeodyglbyunitcp.storage.supabase.co/storage/v1/s3
    #   S3_FORCE_PATH_STYLE   true
    #   S3_BUCKET             maint-agent-attachments
    #   S3_ACCESS_KEY_ID      (Supabase Storage → Settings → S3 Access Keys)
    #   S3_SECRET_ACCESS_KEY  (Supabase Storage → Settings → S3 Access Keys)
    #   BG_JOBS_ENABLED       true
    #   NODE_ENV              production
