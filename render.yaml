services:
  - type: web
    name: maint-agent-api
    runtime: node
    region: frankfurt
    plan: starter

    # --- Source ---
    rootDir: apps/api

    # --- Node version ---
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"

    # --- Build ---
    buildCommand: npm ci && npx prisma generate && npm run build

    # --- Pre-deploy: run migrations before new code goes live ---
    preDeployCommand: npx prisma migrate deploy

    # --- Start ---
    startCommand: node dist/server.js

    # --- Health check ---
    healthCheckPath: /health

    # --- Environment variables (values set in Render dashboard / secret files) ---
    # All vars below must be added manually in Render → Environment tab.
    # See apps/api/.env.staging for the staging values.
    #
    # Required:
    #   DATABASE_URL          postgresql://...supabase.co:5432/postgres
    #   DIRECT_URL            same as DATABASE_URL (used by Prisma migrate)
    #   AUTH_SECRET           32+ char random string (openssl rand -hex 32)
    #   PORT                  (Render sets this automatically — do NOT override)
    #
    # Storage (T-07):
    #   ATTACHMENTS_STORAGE   s3
    #   S3_REGION             eu-central-1
    #   S3_ENDPOINT           https://znsdygeodyglbyunitcp.storage.supabase.co/storage/v1/s3
    #   S3_FORCE_PATH_STYLE   true
    #   S3_BUCKET             maint-agent-attachments
    #   S3_ACCESS_KEY_ID      (from Supabase Storage → Settings → S3 Access Keys)
    #   S3_SECRET_ACCESS_KEY  (from Supabase Storage → Settings → S3 Access Keys)
    #
    # Optional:
    #   BG_JOBS_ENABLED       true
    #   LOG_LEVEL             info
    #   NODE_ENV              production
