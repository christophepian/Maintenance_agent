                jurisdiction: { type: string, default: CH }
                canton: { type: string, nullable: true }
                priority: { type: integer, default: 0 }
                isActive: { type: boolean, default: true }
                dslJson: { type: object }
                citationsJson:
                  type: array
                  items:
                    type: object
                    properties:
                      article: { type: string }
                      text: { type: string }
                summary: { type: string }
                effectiveFrom: { type: string, format: date-time }
