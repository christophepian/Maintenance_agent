        '200':
          description: Tenant invoices
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/InvoiceDTO' }

  /tenant-portal/requests:
    get:
      tags: [TenantPortal]
      summary: List maintenance requests for the authenticated tenant
      operationId: listTenantPortalRequests
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tenant maintenance requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        description: { type: string }
                        category: { type: string, nullable: true }
                        status: { $ref: '#/components/schemas/RequestStatus' }
                        payingParty: { $ref: '#/components/schemas/PayingParty' }
                        rejectionReason: { type: string, nullable: true }
                        unitNumber: { type: string, nullable: true }
                        buildingName: { type: string, nullable: true }
                        assignedContractorName: { type: string, nullable: true }
                        createdAt: { type: string, format: date-time }

  /tenant-portal/requests/{id}/self-pay:
    post:
      tags: [TenantPortal]
      summary: Tenant accepts to proceed at own expense after owner rejection
      operationId: tenantSelfPay
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Request transitioned to RFP_PENDING with payingParty TENANT
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/MaintenanceRequestDTO' }
                  rfpId: { type: string, format: uuid }
        '403': { description: Tenant does not own the request }
        '409': { description: Request is not in OWNER_REJECTED status }

  /tenant-portal/maintenance-attachments/{requestId}:
    get:
      tags: [TenantPortal]
      summary: List attachments for a tenant's own maintenance request
      operationId: tenantListMaintenanceAttachments
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Array of attachment DTOs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/MaintenanceAttachmentDTO' }
        '403': { description: Tenant does not own the request }
        '404': { description: Request not found }
    post:
      tags: [TenantPortal]
      summary: Upload a file attachment from the tenant portal
      operationId: tenantUploadMaintenanceAttachment
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        '201':
          description: Attachment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/MaintenanceAttachmentDTO' }
        '403': { description: Tenant does not own the request }
        '404': { description: Request not found }
        '413': { description: File exceeds size limit }

  /tenant-portal/maintenance-attachments/{id}/download:
    get:
      tags: [TenantPortal]
      summary: Download a maintenance attachment file (tenant portal)
      operationId: tenantDownloadMaintenanceAttachment
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Raw file binary
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '403': { description: Tenant does not own the parent request }
        '404': { description: Attachment not found }

  /tenant-portal/requests/{requestId}/slots:
    get:
      tags: [TenantPortal]
      summary: View proposed appointment slots for a maintenance request
      operationId: listTenantRequestSlots
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: List of appointment slots
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/AppointmentSlotDTO' }
        '403': { description: Not your request }
        '404': { description: No job found for this request }

  /tenant-portal/slots/{slotId}/accept:
    post:
      tags: [TenantPortal]
      summary: Accept a proposed appointment slot
      operationId: acceptTenantSlot
      security:
        - bearerAuth: []
      parameters:
        - name: slotId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Slot accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/AppointmentSlotDTO' }
        '403': { description: Not your request }
        '404': { description: Slot not found }
        '409': { description: Slot not in PROPOSED status }

  /tenant-portal/slots/{slotId}/decline:
    post:
      tags: [TenantPortal]
      summary: Decline a proposed appointment slot
      operationId: declineTenantSlot
      security:
        - bearerAuth: []
      parameters:
        - name: slotId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Slot declined
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/AppointmentSlotDTO' }
        '403': { description: Not your request }
        '404': { description: Slot not found }
        '409': { description: Slot not in PROPOSED status }

  # ── Completion & Ratings (Slice 7) ─────────────────────────────

  /contractor/jobs/{id}/complete:
    post:
      tags: [Contractor]
      summary: Contractor marks a job as completed
      operationId: contractorCompleteJob
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: contractorId
          in: query
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                actualCost: { type: integer, minimum: 0 }
                completedAt: { type: string, format: date-time }
                notes: { type: string }
      responses:
        '200':
          description: Job completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/JobDTO' }
        '403': { description: Forbidden — not your job }
        '404': { description: Job not found }
        '409': { description: Job already completed }

  /contractor/jobs/{id}/rate:
    post:
      tags: [Contractor]
      summary: Contractor submits a rating after job completion
      operationId: contractorRateJob
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: contractorId
          in: query
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [score]
              properties:
                score: { type: integer, minimum: 1, maximum: 5 }
                comment: { type: string, maxLength: 1000 }
      responses:
        '201':
          description: Rating submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/JobRatingDTO' }
        '403': { description: Forbidden — not your job }
        '404': { description: Job not found }
        '409': { description: Job not completed or duplicate rating }

  /tenant-portal/jobs/{jobId}/confirm:
    post:
      tags: [TenantPortal]
      summary: Tenant confirms job completion
      operationId: tenantConfirmCompletion
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Completion confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/JobDTO' }
        '403': { description: Forbidden — not your request }
        '404': { description: Job not found }
        '409': { description: Job not completed or already confirmed }

  /tenant-portal/jobs/{jobId}/rate:
    post:
      tags: [TenantPortal]
      summary: Tenant submits a rating after job completion
      operationId: tenantRateJob
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [score]
              properties:
                score: { type: integer, minimum: 1, maximum: 5 }
                comment: { type: string, maxLength: 1000 }
      responses:
        '201':
          description: Rating submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/JobRatingDTO' }
        '403': { description: Forbidden — not your request }
        '404': { description: Job not found }
        '409': { description: Job not completed or duplicate rating }

  /contractors/{id}/ratings:
    get:
      tags: [Contractor]
      summary: Get contractor rating history
      operationId: getContractorRatings
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Contractor ratings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/JobRatingDTO' }
                  pagination:
                    type: object
                    properties:
                      total: { type: integer }
                      limit: { type: integer }
                      offset: { type: integer }
        '401': { description: Unauthorized }
        '403': { description: Forbidden — manager or owner only }

  /triage:
    post:
      tags: [Auth]
      summary: Triage an incoming request (NLP routing)
