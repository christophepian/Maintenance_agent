  # ═══════════════════════════════════════════════════════════
  # Rent Estimation
  # ═══════════════════════════════════════════════════════════

  /rent-estimation/config:
    get:
      tags: [Rent Estimation]
      summary: Get org-default rent estimation config
      operationId: getRentEstimationConfig
      responses:
        '200':
          description: Current config (auto-created with defaults if missing)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/RentEstimationConfigDTO' }
    put:
      tags: [Rent Estimation]
      summary: Upsert org-default rent estimation config
      operationId: upsertRentEstimationConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                baseRentPerSqmChfMonthly: { type: number, minimum: 1, maximum: 200 }
                locationCoefPrime: { type: number, minimum: 0.5, maximum: 2.5 }
                locationCoefStandard: { type: number, minimum: 0.5, maximum: 2.5 }
                locationCoefPeriphery: { type: number, minimum: 0.5, maximum: 2.5 }
                ageCoefNew: { type: number, minimum: 0.5, maximum: 2.5 }
                ageCoefMid: { type: number, minimum: 0.5, maximum: 2.5 }
                ageCoefOld: { type: number, minimum: 0.5, maximum: 2.5 }
                ageCoefVeryOld: { type: number, minimum: 0.5, maximum: 2.5 }
                energyCoefJson: { type: object, additionalProperties: { type: number } }
                chargesBaseOptimistic: { type: number, minimum: 0, maximum: 1 }
                chargesBasePessimistic: { type: number, minimum: 0, maximum: 1 }
                heatingChargeAdjJson: { type: object, additionalProperties: { type: number } }
                serviceChargeAdjElevator: { type: number, minimum: 0, maximum: 1 }
                serviceChargeAdjConcierge: { type: number, minimum: 0, maximum: 1 }
                chargesMinClamp: { type: number, minimum: 0, maximum: 1 }
                chargesMaxClamp: { type: number, minimum: 0, maximum: 1 }
      responses:
        '200':
          description: Updated config
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/RentEstimationConfigDTO' }
        '400':
          $ref: '#/components/responses/ValidationError'

  /rent-estimation/config/{canton}:
    put:
      tags: [Rent Estimation]
      summary: Upsert canton-specific rent estimation config
      operationId: upsertCantonRentEstimationConfig
      parameters:
        - name: canton
          in: path
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                baseRentPerSqmChfMonthly: { type: number }
                locationCoefPrime: { type: number }
                locationCoefStandard: { type: number }
                locationCoefPeriphery: { type: number }
                ageCoefNew: { type: number }
                ageCoefMid: { type: number }
                ageCoefOld: { type: number }
                ageCoefVeryOld: { type: number }
                energyCoefJson: { type: object }
                chargesBaseOptimistic: { type: number }
                chargesBasePessimistic: { type: number }
                heatingChargeAdjJson: { type: object }
                serviceChargeAdjElevator: { type: number }
                serviceChargeAdjConcierge: { type: number }
                chargesMinClamp: { type: number }
                chargesMaxClamp: { type: number }
      responses:
        '200':
          description: Updated canton config
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/RentEstimationConfigDTO' }
        '400':
          $ref: '#/components/responses/ValidationError'

  /units/{id}/rent-estimate:
    get:
      tags: [Rent Estimation]
      summary: Estimate rent for a single unit
      operationId: estimateRentForUnit
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Rent estimate with breakdown
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/RentEstimateDTO' }
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Unit missing required data (livingAreaSqm)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code: { type: string, example: MISSING_DATA }
                      message: { type: string }

  /rent-estimation/bulk:
    post:
      tags: [Rent Estimation]
      summary: Bulk estimate rent for multiple units
      operationId: bulkEstimateRent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                unitIds:
                  type: array
                  items: { type: string, format: uuid }
                  maxItems: 200
                buildingId: { type: string, format: uuid }
      responses:
        '200':
          description: Array of rent estimates
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/RentEstimateDTO' }
        '400':
          $ref: '#/components/responses/ValidationError'

  # ── Financial Performance ──────────────────────────────────

  /financials/portfolio-summary:
    get:
      tags: [Financials]
      summary: Get portfolio-level financial summary across all buildings
      operationId: getPortfolioSummary
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
            example: '2026-01-01'
          description: Period start (inclusive), YYYY-MM-DD
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
            example: '2026-07-01'
          description: Period end (exclusive), YYYY-MM-DD
      responses:
        '200':
          description: Portfolio-level financial KPIs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: Portfolio summary DTO
        '400':
          $ref: '#/components/responses/ValidationError'

  /buildings/{id}/financials:
    get:
      tags: [Financials]
      summary: Get building financial performance for a period
      operationId: getBuildingFinancials
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
            example: '2026-01-01'
          description: Period start (inclusive), YYYY-MM-DD
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
            example: '2026-07-01'
          description: Period end (exclusive), YYYY-MM-DD
        - name: forceRefresh
          in: query
          schema:
            type: string
            enum: ['true', 'false']
            default: 'false'
          description: If true, recompute all snapshots for the range
        - name: groupByAccount
          in: query
          schema:
            type: string
            enum: ['true', 'false']
            default: 'false'
          description: If true, include expensesByAccount breakdown in the response
      responses:
        '200':
          description: Building financial KPIs and breakdowns
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/BuildingFinancialsDTO' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /invoices/{id}/set-expense-category:
    post:
      tags: [Financials]
      summary: Set expense category on an invoice
      operationId: setInvoiceExpenseCategory
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [expenseCategory]
              properties:
                expenseCategory: { $ref: '#/components/schemas/ExpenseCategory' }
      responses:
        '200':
          description: Updated invoice with new category
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      expenseCategory: { $ref: '#/components/schemas/ExpenseCategory' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Job-linked invoices cannot be re-categorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code: { type: string, example: CONFLICT }
                      message: { type: string }

  # ═══════════════════════════════════════════════════════════
  # Legal Engine
  # ═══════════════════════════════════════════════════════════

  /requests/{id}/legal-decision:
    get:
      tags: [LegalEngine]
      summary: Evaluate legal obligations for a maintenance request
      operationId: evaluateRequestLegalDecision
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Legal decision result
          content:
            application/json:
              schema:
                type: object
        '404':
          $ref: '#/components/responses/NotFound'

  /rfps:
    get:
      tags: [LegalEngine]
      summary: List RFPs
      operationId: listRfps
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: status
          in: query
          schema: { type: string, enum: [DRAFT, OPEN, CLOSED, AWARDED, CANCELLED, PENDING_OWNER_APPROVAL] }
      responses:
        '200':
          description: Paginated list of RFPs
          content:
            application/json:
              schema:
                type: object

  /rfps/{id}:
    get:
      tags: [LegalEngine]
      summary: Get RFP by ID
      operationId: getRfpById
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: RFP details
          content:
            application/json:
              schema:
                type: object
        '404':
          $ref: '#/components/responses/NotFound'

  /rfps/{id}/award:
    post:
      tags: [LegalEngine]
      summary: Award a quote on an RFP
      operationId: awardRfpQuote
      description: >
        Award a quote on an RFP. MANAGER or OWNER role required.
        If the quote amount exceeds the building's owner-approval threshold
        and the actor is a MANAGER, the RFP is routed to PENDING_OWNER_APPROVAL
        instead of being awarded directly.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quoteId]
              properties:
                quoteId:
                  type: string
                  format: uuid
                  description: The ID of the quote to award
      responses:
        '200':
          description: Award result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      rfpId: { type: string, format: uuid }
                      quoteId: { type: string, format: uuid }
                      status: { type: string, enum: [AWARDED, PENDING_OWNER_APPROVAL] }
                      awardedContractorId: { type: string, format: uuid, nullable: true }
                      ownerApprovalRequired: { type: boolean }
        '403':
          description: Owner approval required
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: RFP not in awardable state or quote not submittable

  /rfps/{id}/reinvite:
    post:
      tags: [LegalEngine]
      summary: Re-invite additional contractors to an open RFP
      operationId: reinviteRfpContractors
      description: >
        Re-invite additional contractors to an RFP that is still OPEN.
        Already-invited contractors are silently skipped (idempotent).
        MANAGER role required.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contractorIds]
              properties:
                contractorIds:
                  type: array
                  items: { type: string, format: uuid }
                  minItems: 1
                  maxItems: 20
                  description: IDs of contractors to invite
      responses:
        '200':
          description: Re-invite result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      rfpId: { type: string, format: uuid }
                      addedCount: { type: integer }
                      skippedCount: { type: integer }
                      totalInvites: { type: integer }
        '400':
          description: No valid contractors or validation error
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: RFP is not OPEN

  /rfps/{id}/direct-assign:
    post:
      tags: [LegalEngine]
      summary: Bypass quotes and directly assign a contractor to an RFP
      operationId: directAssignRfpContractor
      description: >
        Close the RFP, reject all submitted quotes, and directly assign
        the specified contractor to the linked maintenance request.
        A Job is auto-created. MANAGER role required.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contractorId]
              properties:
                contractorId:
                  type: string
                  format: uuid
                  description: ID of the contractor to assign
      responses:
        '200':
          description: Direct-assign result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      rfpId: { type: string, format: uuid }
                      requestId: { type: string, format: uuid }
                      contractorId: { type: string, format: uuid }
                      jobCreated: { type: boolean }
                      rfpStatus: { type: string, enum: [CLOSED] }
        '400':
          description: No linked request or contractor not found
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: RFP is not OPEN

  /legal/sources:
    get:
      tags: [LegalEngine]
      summary: List legal sources
      operationId: listLegalSources
      responses:
        '200':
          description: List of legal sources
          content:
            application/json:
              schema:
                type: object
    post:
      tags: [LegalEngine]
      summary: Create a legal source
      operationId: createLegalSource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                jurisdiction: { type: string, default: CH }
                url: { type: string, format: uri, nullable: true }
                updateFrequency: { type: string, nullable: true }
                fetcherType: { type: string, nullable: true }
                parserType: { type: string, nullable: true }
      responses:
        '201':
          description: Created legal source
          content:
            application/json:
              schema:
                type: object

  /legal/sources/{id}:
    patch:
      tags: [LegalEngine]
      summary: Update a legal source
      operationId: updateLegalSource
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                jurisdiction: { type: string }
                url: { type: string, format: uri, nullable: true }
                updateFrequency: { type: string, nullable: true }
                fetcherType: { type: string, nullable: true }
                parserType: { type: string, nullable: true }
                status: { type: string, enum: [ACTIVE, INACTIVE] }
      responses:
        '200':
          description: Updated legal source
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Legal source not found
    delete:
      tags: [LegalEngine]
      summary: Delete a legal source
      operationId: deleteLegalSource
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Source deleted
        '404':
          description: Legal source not found
        '409':
          description: Source has linked data and cannot be deleted

  /legal/variables:
    get:
      tags: [LegalEngine]
      summary: List legal variables with recent versions
      operationId: listLegalVariables
      responses:
        '200':
          description: List of legal variables
          content:
            application/json:
              schema:
                type: object

  /legal/rules:
    get:
      tags: [LegalEngine]
      summary: List legal rules with active version
      operationId: listLegalRules
      responses:
        '200':
          description: List of legal rules
          content:
            application/json:
              schema:
                type: object
    post:
      tags: [LegalEngine]
      summary: Create a legal rule with initial version
      operationId: createLegalRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, ruleType, authority, dslJson, effectiveFrom]
