# ──────────────────────────────────────────────────────────────
# Paths
# ──────────────────────────────────────────────────────────────

paths:
  # ═══════════════════════════════════════════════════════════
  # Auth & Tenant Portal
  # ═══════════════════════════════════════════════════════════

  /tenant-session:
    post:
      tags: [Auth]
      summary: Create a tenant session from phone number
      operationId: createTenantSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone: { type: string }
      responses:
        '200':
          description: Session info
          content:
            application/json:
              schema:
                type: object

  /tenant-portal/leases:
    get:
      tags: [Auth]
      summary: List leases visible to tenant
      operationId: listTenantPortalLeases
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Lease list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/LeaseDTO' }

  /tenant-portal/leases/{id}:
    get:
      tags: [Auth]
      summary: Get a single tenant portal lease
      operationId: getTenantPortalLease
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Lease details
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LeaseDTO' }
        '404': { $ref: '#/components/responses/NotFound' }

  /tenant-portal/leases/{id}/accept:
    post:
      tags: [Auth]
      summary: Tenant accepts a lease
      operationId: acceptTenantPortalLease
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Acceptance result
          content:
            application/json:
              schema: { type: object }

  /tenant-portal/notifications:
    get:
      tags: [TenantPortal]
      summary: List tenant notifications
      operationId: listTenantPortalNotifications
      parameters:
        - name: tenantId
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: unreadOnly
          in: query
          schema: { type: string, enum: ['true', 'false'] }
      responses:
        '200':
          description: Paginated notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/NotificationDTO' }
                  total: { type: integer }

