      responses:
        '200':
          description: Paginated list of contractor-safe RFP summaries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ContractorRfpDTO' }
                  total: { type: integer }
        '403':
          description: Forbidden — only CONTRACTOR role
        '404':
          description: Contractor not found in org

  /contractor/rfps/{id}:
    get:
      tags: [Contractor]
      summary: Get contractor-safe RFP detail
      operationId: getContractorRfp
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: contractorId
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Contractor-safe RFP detail (no full address, no tenant identity)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ContractorRfpDTO' }
        '403':
          description: Forbidden — only CONTRACTOR role
        '404':
          description: RFP not found or not visible to contractor

  /contractor/rfps/{id}/quotes:
    post:
      tags: [Contractor]
      summary: Submit a quote for an RFP
      operationId: submitContractorQuote
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: contractorId
          in: query
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amountCents, workPlan]
              properties:
                amountCents: { type: integer, minimum: 1, description: Total amount in centimes }
                currency: { type: string, default: CHF }
                vatIncluded: { type: boolean, default: true }
                estimatedDurationDays: { type: integer, minimum: 1 }
                earliestAvailability: { type: string, format: date-time }
                lineItems:
                  type: array
                  items:
                    type: object
                    required: [description, amountCents]
                    properties:
                      description: { type: string }
                      amountCents: { type: integer }
                workPlan: { type: string, minLength: 1, description: Narrative work plan }
                assumptions: { type: string }
                validUntil: { type: string, format: date-time }
                notes: { type: string }
      responses:
        '201':
          description: Quote submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/RfpQuoteDTO' }
        '400':
          description: Validation error (missing required fields)
        '403':
          description: Forbidden — only CONTRACTOR role, or RFP not visible
        '409':
          description: Conflict — RFP not open, or duplicate quote

  /contractor/jobs/{id}/slots:
    post:
      tags: [Contractor]
      summary: Propose appointment slots for a job
      operationId: proposeContractorSlots
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: contractorId
          in: query
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slots]
              properties:
                slots:
                  type: array
                  minItems: 1
                  maxItems: 5
                  items:
                    type: object
                    required: [startTime, endTime]
                    properties:
                      startTime: { type: string, format: date-time }
                      endTime: { type: string, format: date-time }
      responses:
        '201':
          description: Slots proposed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      slots:
                        type: array
                        items: { $ref: '#/components/schemas/AppointmentSlotDTO' }
                      schedulingExpiresAt: { type: string, format: date-time }
        '400': { description: Validation error }
        '403': { description: Forbidden — not a contractor or wrong contractor }
        '404': { description: Job not found }
        '409': { description: Job not in PENDING status }
    get:
      tags: [Contractor]
      summary: List appointment slots for a job (contractor view)
      operationId: listContractorJobSlots
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: contractorId
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: List of appointment slots
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/AppointmentSlotDTO' }
        '403': { description: Forbidden — not a contractor }
        '404': { description: Contractor not found in org }

