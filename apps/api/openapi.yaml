openapi: 3.1.0
info:
  title: Maintenance Agent API
  description: |
    Web-first MVP for routing tenant maintenance requests directly to
    contractors with minimal property manager involvement.
  version: 1.0.0
  contact:
    name: Maintenance Agent Team

servers:
  - url: http://localhost:3001
    description: Local development

tags:
  - name: Auth
    description: Authentication, tenant portal, triage
  - name: Requests
    description: Maintenance request lifecycle
  - name: Jobs
    description: Job lifecycle (assigned work)
  - name: Invoices
    description: Invoice lifecycle and billing
  - name: Leases
    description: Lease lifecycle and PDF generation
  - name: SignatureRequests
    description: Signature request management
  - name: Config
    description: Org, building, and unit configuration
  - name: ApprovalRules
    description: Dynamic approval rule management
  - name: BillingEntities
    description: Billing entity CRUD
  - name: Inventory
    description: Properties, buildings, units, appliances, asset models
  - name: Tenants
    description: Tenant and contractor person management
  - name: Notifications
    description: In-app notification management
  - name: Dev
    description: Development-only endpoints (disabled in production)

# ──────────────────────────────────────────────────────────────
# Reusable components
# ──────────────────────────────────────────────────────────────

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        default: 50
    OffsetParam:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    OrderParam:
      name: order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    StatusFilter:
      name: status
      in: query
      schema:
        type: string

  schemas:
    # ── Enums ──────────────────────────────────────────────────

    RequestStatus:
      type: string
      enum:
        - PENDING_REVIEW
        - PENDING_OWNER_APPROVAL
        - AUTO_APPROVED
        - APPROVED
        - ASSIGNED
        - IN_PROGRESS
        - COMPLETED

    JobStatus:
      type: string
      enum: [PENDING, IN_PROGRESS, COMPLETED, INVOICED]

    InvoiceStatus:
      type: string
      enum: [DRAFT, APPROVED, PAID, DISPUTED]

    LeaseStatus:
      type: string
      enum: [DRAFT, READY_TO_SIGN, SIGNED, ACTIVE, TERMINATED, CANCELLED]

    SignatureRequestStatus:
      type: string
      enum: [DRAFT, SENT, SIGNED, DECLINED, EXPIRED, ERROR]

    RequestEventType:
      type: string
      enum: [ARRIVED, PARTS_ORDERED, COMPLETED, OWNER_APPROVED, OWNER_REJECTED, NOTE, OTHER]

    RuleAction:
      type: string
      enum: [AUTO_APPROVE, REQUIRE_MANAGER_REVIEW, REQUIRE_OWNER_APPROVAL]

    BillingEntityType:
      type: string
      enum: [CONTRACTOR, ORG, OWNER]

    UnitType:
      type: string
      enum: [RESIDENTIAL, COMMON_AREA]

    Role:
      type: string
      enum: [TENANT, CONTRACTOR, MANAGER, OWNER]

    # ── Error envelope ─────────────────────────────────────────

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details: {}

    # ── DTOs ───────────────────────────────────────────────────

    ContractorSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        phone: { type: string }
        email: { type: string }
        hourlyRate: { type: number }

    TenantSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string, nullable: true }
        phone: { type: string }
        email: { type: string, nullable: true }

    UnitSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        unitNumber: { type: string }
        floor: { type: string }
        type: { type: string }
        building:
          type: object
          properties:
            id: { type: string, format: uuid }
            name: { type: string }
            address: { type: string }

    ApplianceSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        category: { type: string }
        serial: { type: string }

    MaintenanceRequestDTO:
      type: object
      required: [id, description, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        description: { type: string }
        category: { type: string, nullable: true }
        estimatedCost: { type: number, nullable: true }
        status: { $ref: '#/components/schemas/RequestStatus' }
        contactPhone: { type: string, nullable: true }
        tenantId: { type: string, format: uuid, nullable: true }
        unitId: { type: string, format: uuid, nullable: true }
        applianceId: { type: string, format: uuid, nullable: true }
        assignedContractor:
          nullable: true
          $ref: '#/components/schemas/ContractorSummary'
        tenant:
          nullable: true
          $ref: '#/components/schemas/TenantSummary'
        unit:
          nullable: true
          $ref: '#/components/schemas/UnitSummary'
        appliance:
          nullable: true
          $ref: '#/components/schemas/ApplianceSummary'
        createdAt: { type: string, format: date-time }

    RequestEventDTO:
      type: object
      required: [id, requestId, contractorId, type, message, timestamp]
      properties:
        id: { type: string, format: uuid }
        requestId: { type: string, format: uuid }
        contractorId: { type: string, format: uuid }
        type: { $ref: '#/components/schemas/RequestEventType' }
        message: { type: string }
        timestamp: { type: string, format: date-time }

    JobDTO:
      type: object
      required: [id, orgId, requestId, contractorId, status, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        requestId: { type: string, format: uuid }
        contractorId: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/JobStatus' }
        actualCost: { type: number }
        startedAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        request:
          type: object
          properties:
            description: { type: string }
            category: { type: string }
            contactPhone: { type: string }
            tenant: { $ref: '#/components/schemas/TenantSummary' }
            unit: { $ref: '#/components/schemas/UnitSummary' }
            appliance: { $ref: '#/components/schemas/ApplianceSummary' }
        contractor: { $ref: '#/components/schemas/ContractorSummary' }

    InvoiceLineItemDTO:
      type: object
      required: [id, description, quantity, unitPrice, vatRate, lineTotal]
      properties:
        id: { type: string, format: uuid }
        description: { type: string }
        quantity: { type: number }
        unitPrice: { type: number }
        vatRate: { type: number }
        lineTotal: { type: number }

    InvoiceDTO:
      type: object
      required:
        - id
        - orgId
        - jobId
        - amount
        - recipientName
        - recipientAddressLine1
        - recipientPostalCode
        - recipientCity
        - recipientCountry
        - invoiceNumberFormat
        - subtotalAmount
        - vatAmount
        - totalAmount
        - currency
        - vatRate
        - status
        - createdAt
        - updatedAt
        - lineItems
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        jobId: { type: string, format: uuid }
        amount: { type: number }
        description: { type: string }
        issuerBillingEntityId: { type: string, format: uuid }
        recipientName: { type: string }
        recipientAddressLine1: { type: string }
        recipientAddressLine2: { type: string }
        recipientPostalCode: { type: string }
        recipientCity: { type: string }
        recipientCountry: { type: string }
        issueDate: { type: string, format: date-time }
        dueDate: { type: string, format: date-time }
        invoiceNumber: { type: string }
        invoiceNumberFormat: { type: string }
        subtotalAmount: { type: number }
        vatAmount: { type: number }
        totalAmount: { type: number }
        currency: { type: string }
        vatRate: { type: number }
        paymentReference: { type: string }
        iban: { type: string }
        status: { $ref: '#/components/schemas/InvoiceStatus' }
        lockedAt: { type: string, format: date-time }
        submittedAt: { type: string, format: date-time }
        approvedAt: { type: string, format: date-time }
        paidAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        lineItems:
          type: array
          items: { $ref: '#/components/schemas/InvoiceLineItemDTO' }

    LeaseDTO:
      type: object
      required:
        - id
        - orgId
        - status
        - unitId
        - landlordName
        - landlordAddress
        - landlordZipCity
        - tenantName
        - objectType
        - startDate
        - isFixedTerm
        - noticeRule
        - terminationDatesRule
        - netRentChf
        - depositDueRule
        - includesHouseRules
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/LeaseStatus' }
        applicationId: { type: string }
        unitId: { type: string, format: uuid }
        landlordName: { type: string }
        landlordAddress: { type: string }
        landlordZipCity: { type: string }
        landlordPhone: { type: string }
        landlordEmail: { type: string }
        landlordRepresentedBy: { type: string }
        tenantName: { type: string }
        tenantAddress: { type: string }
        tenantZipCity: { type: string }
        tenantPhone: { type: string }
        tenantEmail: { type: string }
        coTenantName: { type: string }
        objectType: { type: string }
        roomsCount: { type: string }
        floor: { type: string }
        buildingAddressLines:
          type: array
          items: { type: string }
        usageFlags:
          type: object
          additionalProperties: { type: boolean }
        serviceSpaces:
          type: object
          additionalProperties: true
        commonInstallations:
          type: object
          additionalProperties: true
        startDate: { type: string, format: date }
        isFixedTerm: { type: boolean }
        endDate: { type: string, format: date }
        firstTerminationDate: { type: string, format: date }
        noticeRule: { type: string }
        extendedNoticeText: { type: string }
        terminationDatesRule: { type: string }
        terminationDatesCustomText: { type: string }
        netRentChf: { type: number }
        garageRentChf: { type: number }
        otherServiceRentChf: { type: number }
        chargesItems:
          type: array
          items:
            type: object
            properties:
              label: { type: string }
              mode: { type: string }
              amountChf: { type: number }
        chargesTotalChf: { type: number }
        rentTotalChf: { type: number }
        chargesSettlementDate: { type: string }
        paymentDueDayOfMonth: { type: integer }
        paymentRecipient: { type: string }
        paymentInstitution: { type: string }
        paymentAccountNumber: { type: string }
        paymentIban: { type: string }
        referenceRatePercent: { type: string }
        referenceRateDate: { type: string }
        depositChf: { type: number }
        depositDueRule: { type: string }
        depositDueDate: { type: string }
        otherStipulations: { type: string }
        includesHouseRules: { type: boolean }
        otherAnnexesText: { type: string }
        draftPdfStorageKey: { type: string }
        draftPdfSha256: { type: string }
        signedPdfStorageKey: { type: string }
        signedPdfSha256: { type: string }
        depositPaidAt: { type: string, format: date-time }
        depositConfirmedBy: { type: string }
        depositBankRef: { type: string }
        activatedAt: { type: string, format: date-time }
        terminatedAt: { type: string, format: date-time }
        terminationReason: { type: string }
        terminationNotice: { type: string }
        archivedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        unit: { $ref: '#/components/schemas/UnitSummary' }

    SignatureRequestDTO:
      type: object
      required: [id, leaseId, status, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        leaseId: { type: string, format: uuid }
        provider: { type: string }
        level: { type: string }
        status: { $ref: '#/components/schemas/SignatureRequestStatus' }
        sentAt: { type: string, format: date-time }
        signedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    OrgConfigDTO:
      type: object
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        autoApproveLimit: { type: integer }
        landlordName: { type: string }
        landlordAddress: { type: string }
        landlordZipCity: { type: string }
        landlordPhone: { type: string }
        landlordEmail: { type: string }
        landlordRepresentedBy: { type: string }

    BuildingConfigDTO:
      type: object
      properties:
        id: { type: string, format: uuid }
        buildingId: { type: string, format: uuid }
        orgId: { type: string, format: uuid }

    UnitConfigDTO:
      type: object
      properties:
        id: { type: string, format: uuid }
        unitId: { type: string, format: uuid }
        orgId: { type: string, format: uuid }

    ApprovalRuleDTO:
      type: object
      required: [id, orgId, name, priority, isActive, conditions, action, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        buildingId: { type: string, format: uuid }
        name: { type: string }
        priority: { type: integer }
        isActive: { type: boolean }
        conditions: { type: string, description: 'JSON string of RuleCondition[]' }
        action: { $ref: '#/components/schemas/RuleAction' }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    BillingEntityDTO:
      type: object
      required: [id, orgId, type, name, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        type: { $ref: '#/components/schemas/BillingEntityType' }
        name: { type: string }
        addressLine1: { type: string }
        addressLine2: { type: string }
        postalCode: { type: string }
        city: { type: string }
        country: { type: string }
        iban: { type: string }
        vatNumber: { type: string }
        isDefault: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    PropertyDTO:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        address: { type: string }

    BuildingDTO:
      type: object
      required: [id, orgId, name, address, createdAt]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        name: { type: string }
        address: { type: string }
        city: { type: string }
        postalCode: { type: string }
        createdAt: { type: string, format: date-time }

    UnitDTO:
      type: object
      required: [id, orgId, buildingId, unitNumber, type]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        buildingId: { type: string, format: uuid }
        unitNumber: { type: string }
        floor: { type: string }
        type: { $ref: '#/components/schemas/UnitType' }
        building:
          type: object
          properties:
            id: { type: string, format: uuid }
            name: { type: string }
            address: { type: string }

    ApplianceDTO:
      type: object
      required: [id, unitId, orgId, category]
      properties:
        id: { type: string, format: uuid }
        unitId: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        category: { type: string }
        serial: { type: string }
        assetModelId: { type: string, format: uuid }
        installedDate: { type: string, format: date }
        lastServiceDate: { type: string, format: date }
        assetModel:
          $ref: '#/components/schemas/AssetModelDTO'

    AssetModelDTO:
      type: object
      required: [id, orgId, brand, model, category]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        brand: { type: string }
        model: { type: string }
        category: { type: string }
        expectedLifespanYears: { type: integer }

    TenantDTO:
      type: object
      required: [id, orgId, name, phone]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        name: { type: string }
        phone: { type: string }
        email: { type: string }
        unitId: { type: string, format: uuid }

    ContractorDTO:
      type: object
      required: [id, orgId, name, phone]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        name: { type: string }
        phone: { type: string }
        email: { type: string }
        specialties:
          type: array
          items: { type: string }
        hourlyRate: { type: number }

    NotificationDTO:
      type: object
      required: [id, orgId, eventType, message, isRead, createdAt]
      properties:
        id: { type: string, format: uuid }
        orgId: { type: string, format: uuid }
        eventType: { type: string }
        message: { type: string }
        isRead: { type: boolean }
        requestId: { type: string, format: uuid }
        jobId: { type: string, format: uuid }
        invoiceId: { type: string, format: uuid }
        actorName: { type: string }
        metadata: { type: object, additionalProperties: true }
        createdAt: { type: string, format: date-time }

    # ── Request bodies ─────────────────────────────────────────

    CreateRequestBody:
      type: object
      required: [description]
      properties:
        description: { type: string, minLength: 10, maxLength: 2000 }
        category:
          type: string
          enum: [stove, oven, dishwasher, bathroom, lighting]
        estimatedCost: { type: integer, minimum: 0, maximum: 100000 }
        contactPhone: { type: string }
        tenantId: { type: string, format: uuid }
        unitId: { type: string, format: uuid }
        applianceId: { type: string, format: uuid }

    PaginatedList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items: {}
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Forbidden — org scope mismatch
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

# ──────────────────────────────────────────────────────────────
# Paths
# ──────────────────────────────────────────────────────────────

paths:
  # ═══════════════════════════════════════════════════════════
  # Auth & Tenant Portal
  # ═══════════════════════════════════════════════════════════

  /tenant-session:
    post:
      tags: [Auth]
      summary: Create a tenant session from phone number
      operationId: createTenantSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone: { type: string }
      responses:
        '200':
          description: Session info
          content:
            application/json:
              schema:
                type: object

  /tenant-portal/leases:
    get:
      tags: [Auth]
      summary: List leases visible to tenant
      operationId: listTenantPortalLeases
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Lease list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/LeaseDTO' }

  /tenant-portal/leases/{id}:
    get:
      tags: [Auth]
      summary: Get a single tenant portal lease
      operationId: getTenantPortalLease
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Lease details
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LeaseDTO' }
        '404': { $ref: '#/components/responses/NotFound' }

  /tenant-portal/leases/{id}/accept:
    post:
      tags: [Auth]
      summary: Tenant accepts a lease
      operationId: acceptTenantPortalLease
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Acceptance result
          content:
            application/json:
              schema: { type: object }

  /triage:
    post:
      tags: [Auth]
      summary: Triage an incoming request (NLP routing)
      operationId: triageRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string }
      responses:
        '200':
          description: Triage result
          content:
            application/json:
              schema: { type: object }

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, role]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 6 }
                role: { $ref: '#/components/schemas/Role' }
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  token: { type: string }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: JWT token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user:
                    type: object

  # ═══════════════════════════════════════════════════════════
  # Maintenance Requests
  # ═══════════════════════════════════════════════════════════

  /requests:
    get:
      tags: [Requests]
      summary: List maintenance requests
      operationId: listRequests
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/OrderParam'
        - $ref: '#/components/parameters/StatusFilter'
      responses:
        '200':
          description: Paginated request list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/MaintenanceRequestDTO' }
                  total: { type: integer }
                  limit: { type: integer }
                  offset: { type: integer }
    post:
      tags: [Requests]
      summary: Create a maintenance request
      operationId: createRequest
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRequestBody' }
      responses:
        '201':
          description: Created request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MaintenanceRequestDTO' }
        '400': { $ref: '#/components/responses/ValidationError' }

  /requests/{id}:
    get:
      tags: [Requests]
      summary: Get a single request by ID
      operationId: getRequest
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
