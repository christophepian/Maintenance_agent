      responses:
        '201':
          description: Created category mapping
          content:
            application/json:
              schema:
                type: object
        '409':
          description: Mapping for this category already exists

  /legal/category-mappings/{id}:
    put:
      tags: [LegalEngine]
      summary: Update a category mapping
      operationId: updateCategoryMapping
