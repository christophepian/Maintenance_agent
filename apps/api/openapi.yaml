                installedAt: { type: string, format: date-time, nullable: true }
                lastRenovatedAt: { type: string, format: date-time, nullable: true }
      responses:
        '201':
          description: Created asset
          content:
            application/json:
              schema:
                type: object

  /legal/ingest:
    post:
      tags: [LegalEngine]
      summary: Trigger manual data ingestion
      operationId: triggerIngestion
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceId: { type: string, format: uuid }
      responses:
        '200':
          description: Ingestion results
          content:
            application/json:
              schema:
                type: object

  # ── Maintenance Attachments ──────────────────────────────────

  /maintenance-attachments/{requestId}:
    get:
      tags: [Requests]
      summary: List attachments for a maintenance request
      operationId: listMaintenanceAttachments
      parameters:
        - name: requestId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Attachment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MaintenanceAttachment'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Requests]
      summary: Upload a file attachment to a maintenance request
      operationId: uploadMaintenanceAttachment
      parameters:
        - name: requestId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Uploaded attachment
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MaintenanceAttachment'
        '400':
          $ref: '#/components/responses/ValidationError'
        '413':
          description: File too large

  /maintenance-attachments/{id}/download:
    get:
      tags: [Requests]
      summary: Download a maintenance attachment file
      operationId: downloadMaintenanceAttachment
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Attachment file binary
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

  # ═══════════════════════════════════════════════════════════════
  # Chart of Accounts (COA)
  # ═══════════════════════════════════════════════════════════════

  /coa/expense-types:
    get:
      tags: [ChartOfAccounts]
      summary: List expense types for the authenticated org
      operationId: listExpenseTypes
      responses:
        '200':
          description: List of expense types
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExpenseType'
    post:
      tags: [ChartOfAccounts]
      summary: Create a new expense type
      operationId: createExpenseType
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
                code: { type: string }
      responses:
        '201':
          description: Created expense type
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ExpenseType'
        '409':
          $ref: '#/components/responses/Conflict'

  /coa/expense-types/{id}:
    get:
      tags: [ChartOfAccounts]
      summary: Get a single expense type by ID
      operationId: getExpenseType
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Expense type detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ExpenseType'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [ChartOfAccounts]
      summary: Update an expense type
      operationId: updateExpenseType
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                code: { type: string }
                isActive: { type: boolean }
      responses:
        '200':
          description: Updated expense type
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ExpenseType'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /coa/accounts:
    get:
      tags: [ChartOfAccounts]
      summary: List accounts for the authenticated org
      operationId: listAccounts
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'
    post:
      tags: [ChartOfAccounts]
      summary: Create a new account
      operationId: createAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                code: { type: string }
                accountType: { type: string, enum: [EXPENSE, REVENUE, ASSET] }
      responses:
        '201':
          description: Created account
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Account'
        '409':
          $ref: '#/components/responses/Conflict'

  /coa/accounts/{id}:
    get:
      tags: [ChartOfAccounts]
      summary: Get a single account by ID
      operationId: getAccount
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Account detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Account'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [ChartOfAccounts]
      summary: Update an account
      operationId: updateAccount
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                code: { type: string }
                accountType: { type: string, enum: [EXPENSE, REVENUE, ASSET] }
                isActive: { type: boolean }
      responses:
        '200':
          description: Updated account
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Account'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /coa/expense-mappings:
    get:
      tags: [ChartOfAccounts]
      summary: List expense mappings for the authenticated org
      operationId: listExpenseMappings
      responses:
        '200':
          description: List of expense mappings with joined expense type, account, and building
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExpenseMapping'
    post:
      tags: [ChartOfAccounts]
      summary: Create an expense mapping (expense type to account, optionally per building)
      operationId: createExpenseMapping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [expenseTypeId, accountId]
              properties:
                expenseTypeId: { type: string, format: uuid }
                accountId: { type: string, format: uuid }
                buildingId: { type: string, format: uuid, nullable: true }
      responses:
        '201':
          description: Created expense mapping
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ExpenseMapping'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /coa/expense-mappings/{id}:
    delete:
      tags: [ChartOfAccounts]
      summary: Delete an expense mapping
      operationId: deleteExpenseMapping
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Mapping deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      success: { type: boolean }
        '404':
          $ref: '#/components/responses/NotFound'

  /ledger:
    get:
      tags: [Ledger]
      summary: List paginated double-entry journal entries
      operationId: listLedgerEntries
      parameters:
        - { name: limit,       in: query, schema: { type: integer, default: 50 } }
        - { name: offset,      in: query, schema: { type: integer, default: 0 } }
        - { name: from,        in: query, schema: { type: string, format: date } }
        - { name: to,          in: query, schema: { type: string, format: date } }
        - { name: accountCode, in: query, schema: { type: string } }
        - { name: sourceType,  in: query, schema: { type: string } }
      responses:
        '200':
          description: Paginated journal entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/LedgerEntry' }
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /ledger/trial-balance:
    get:
      tags: [Ledger]
      summary: Get trial balance (aggregated debit/credit per account)
      operationId: getTrialBalance
      parameters:
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to,   in: query, schema: { type: string, format: date } }
      responses:
        '200':
          description: Trial balance rows
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/AccountBalance' }

  /ledger/accounts/{accountId}/balance:
    get:
      tags: [Ledger]
      summary: Get balance for a single account
      operationId: getAccountBalance
      parameters:
        - name: accountId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to,   in: query, schema: { type: string, format: date } }
      responses:
        '200':
          description: Account balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/AccountBalance' }
        '404':
          $ref: '#/components/responses/NotFound'

  /coa/seed:
    post:
      tags: [ChartOfAccounts]
      summary: Seed the canonical Swiss residential expense taxonomy for the org
      operationId: seedCoaTaxonomy
      responses:
        '200':
          description: Seed result counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      expenseTypes: { type: integer }
                      accounts: { type: integer }
                      mappings: { type: integer }