  # Jobs
  # ═══════════════════════════════════════════════════════════

  /jobs:
    get:
      tags: [Jobs]
      summary: List all jobs
      operationId: listJobs
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/OrderParam'
        - $ref: '#/components/parameters/StatusFilter'
        - name: view
          in: query
          description: "H5: Choose summary (lightweight) or full (default) DTO"
          schema:
            type: string
            enum: [summary, full]
            default: full
      responses:
        '200':
          description: Job list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      oneOf:
                        - $ref: '#/components/schemas/JobDTO'
                        - $ref: '#/components/schemas/JobSummaryDTO'
                  total: { type: integer }
                  limit: { type: integer }
                  offset: { type: integer }

  /jobs/{id}:
    get:
      tags: [Jobs]
      summary: Get a job by ID
      operationId: getJob
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JobDTO' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Jobs]
      summary: Update a job
      operationId: updateJob
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { $ref: '#/components/schemas/JobStatus' }
